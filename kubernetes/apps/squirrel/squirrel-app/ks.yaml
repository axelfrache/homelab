---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: squirrel-app
spec:
  dependsOn:
    - name: squirrel-db
      namespace: squirrel
    - name: opentelemetry-collector
      namespace: monitoring
  interval: 1h
  path: ./kubernetes/apps/squirrel/squirrel-app/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: squirrel
  wait: true
