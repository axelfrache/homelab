---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: squirrel-frontend
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - squirrel.${SECRET_LOCAL_DOMAIN}
  rules:
    - backendRefs:
        - name: squirrel-frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: squirrel-backend
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - squirrel-api.${SECRET_LOCAL_DOMAIN}
  rules:
    - backendRefs:
        - name: squirrel-backend
          port: 8080
