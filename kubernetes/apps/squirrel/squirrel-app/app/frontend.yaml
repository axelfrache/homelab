apiVersion: apps/v1
kind: Deployment
metadata:
  name: squirrel-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squirrel-frontend
  template:
    metadata:
      labels:
        app: squirrel-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/axelfrache/squirrel-frontend:latest@sha256:b5ca80c3ac3bb1fcb3d8d0a73f6bdaa04b346ef74d14f38bb655ed3f093932ab # {"$imagepolicy": "flux-system:squirrel-frontend"}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: squirrel-frontend
spec:
  selector:
    app: squirrel-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
