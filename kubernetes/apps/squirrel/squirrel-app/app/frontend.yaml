apiVersion: apps/v1
kind: Deployment
metadata:
  name: squirrel-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squirrel-frontend
  template:
    metadata:
      labels:
        app: squirrel-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/axelfrache/squirrel-frontend:latest@sha256:b6e1a4ee76677e190c7fe7810c6f4c2411abe9ed756569f45f42475651ccaef8 # {"$imagepolicy": "flux-system:squirrel-frontend"}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: squirrel-frontend
spec:
  selector:
    app: squirrel-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
