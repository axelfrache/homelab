---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: squirrel-minio-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squirrel-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squirrel-minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: squirrel-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: squirrel-minio-secret
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squirrel-minio-secret
                  key: secret-key
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: squirrel-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: squirrel-minio
spec:
  selector:
    app: squirrel-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
