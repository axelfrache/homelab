apiVersion: apps/v1
kind: Deployment
metadata:
  name: squirrel-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squirrel-backend
  template:
    metadata:
      labels:
        app: squirrel-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/axelfrache/squirrel-backend:latest@sha256:d5ca448bb1c25a989bcc22a42f06f07e18a8c67dfda06fdc4c4dc02f0c6751d4 # {"$imagepolicy": "flux-system:squirrel-backend"}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: squirrel-db-app
                  key: host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: squirrel-db-app
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: squirrel-db-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squirrel-db-app
                  key: password
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: squirrelvault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: squirrel-backend
spec:
  selector:
    app: squirrel-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
