---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-postgres
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-secret

  storage:
    size: 2Gi

  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi
