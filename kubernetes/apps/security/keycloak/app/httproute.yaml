---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - keycloak.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: keycloak
          port: 80
