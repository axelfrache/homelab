---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  chartRef:
    kind: OCIRepository
    name: keycloak
  interval: 1h
  values:
    auth:
      adminUser: admin
      existingSecret: keycloak-secret
      passwordSecretKey: admin-password
    production: true
    proxyHeaders: xforwarded
    hostnameStrict: true
    httpEnabled: true
    extraEnvVars:
      - name: KC_HOSTNAME
        value: https://keycloak.${SECRET_DOMAIN}
      - name: KC_HOSTNAME_ADMIN
        value: https://keycloak.${SECRET_DOMAIN}
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    startupProbe:
      enabled: true
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 18
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: security
    postgresql:
      enabled: true
      auth:
        username: keycloak
        database: keycloak
        existingSecret: keycloak-secret
        secretKeys:
          userPasswordKey: password
      primary:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 5Gi
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
    keycloakConfigCli:
      enabled: true
      cleanupAfterFinished:
        enabled: true
        seconds: 600
      configuration:
        questify.yaml: |
          realm: questify
          enabled: true
          displayName: Questify
          registrationAllowed: false
          resetPasswordAllowed: true
          loginWithEmailAllowed: true
          duplicateEmailsAllowed: false
          clients:
            - clientId: questify-frontend
              name: Questify Frontend
              description: Browser client for the deployed Questify instance
              enabled: true
              publicClient: true
              protocol: openid-connect
              standardFlowEnabled: true
              directAccessGrantsEnabled: false
              implicitFlowEnabled: false
              serviceAccountsEnabled: false
              redirectUris:
                - https://app.${SECRET_DOMAIN}/*
                - https://app.getquestify.com/*
                - http://localhost:3000/*
                - http://localhost:5173/*
              webOrigins:
                - https://app.${SECRET_DOMAIN}
                - https://app.getquestify.com
                - http://localhost:3000
                - http://localhost:5173
              attributes:
                pkce.code.challenge.method: S256
