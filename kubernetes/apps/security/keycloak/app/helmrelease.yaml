---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  chartRef:
    kind: OCIRepository
    name: keycloak
  interval: 1h
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    auth:
      adminUser: admin
      existingSecret: keycloak-secret
      passwordSecretKey: admin-password

    # Keycloak 26 behind Envoy Gateway (TLS terminated at gateway)
    production: true
    proxy: edge

    extraEnvVars:
      - name: KC_HOSTNAME
        value: auth.getquestify.com
      - name: KC_HOSTNAME_STRICT
        value: "false"
      - name: KC_HTTP_ENABLED
        value: "true"

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

    serviceMonitor:
      enabled: true

    metrics:
      enabled: true

    postgresql:
      enabled: true
      auth:
        username: keycloak
        database: keycloak
        existingSecret: keycloak-secret
        secretKeys:
          userPasswordKey: database-password
      primary:
        persistence:
          size: 2Gi
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 256Mi
