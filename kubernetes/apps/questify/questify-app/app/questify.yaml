apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garage-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      enableServiceLinks: false
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: questify
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: rabbitmq-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: memory.conf
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
        - name: config
          configMap:
            name: rabbitmq-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
data:
  memory.conf: |
    vm_memory_high_watermark.absolute = 512MB
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      enableServiceLinks: false
      containers:
        - name: garage
          image: ghcr.io/axelfrache/questify-garage:latest@sha256:760db174b1dbd2f2659649e31d3068ab63f4d2e892372e7d6467698f7ae70344 # {"$imagepolicy": "flux-system:questify-garage"}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - /entrypoint.sh
          ports:
            - containerPort: 3900
              name: http
            - containerPort: 3901
              name: rpc
            - containerPort: 3902
              name: web
            - containerPort: 3903
              name: admin
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-rpc-secret
            - name: GARAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-access-key-id
            - name: GARAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-secret-access-key
          volumeMounts:
            - name: data
              mountPath: /var/lib/garage
            - name: garage-config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: garage-config
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
              readOnly: true
          readinessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/garage-ready
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/garage-ready
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: garage-data
        - name: garage-config
          configMap:
            name: questify-garage-config
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: garage
spec:
  selector:
    app: garage
  ports:
    - name: http
      port: 3900
      targetPort: http
    - name: web
      port: 3902
      targetPort: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 15
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth-service
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -w 5 -z questify-postgres-rw 5432; do sleep 2; done; until nc -w 5 -z rabbitmq 5672; do sleep 2; done; until nc -w 5 -z garage 3900; do sleep 2; done
      containers:
        - name: auth-service
          image: ghcr.io/axelfrache/questify-auth-service:latest@sha256:81b00ceff37d4f9ce6bc5dbf75d7508d4b425d404bb569f9e5b4b0afaedd66d5 # {"$imagepolicy": "flux-system:questify-auth-service"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://questify-postgres-rw:5432/questify?currentSchema=auth
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: questify-postgres-app
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-postgres-app
                  key: password
            - name: SPRING_DATASOURCE_DRIVER
              value: org.postgresql.Driver
            - name: SPRING_JPA_DDL_AUTO
              value: update
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USERNAME
              value: questify
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: rabbitmq-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: jwt-secret
            - name: S3_ENDPOINT
              value: http://garage:3900
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-access-key-id
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-secret-access-key
            - name: S3_BUCKET
              value: questify-profiles
            - name: S3_REGION
              value: garage
            - name: S3_PUBLIC_URL
              value: https://app.getquestify.com/storage
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "5"
            - name: CORS_ALLOWED_ORIGINS
              value: https://app.getquestify.com
            - name: COOKIE_SECURE
              value: "true"
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-bootstrap-password
            - name: FERRISKEY_ISSUER_URI
              value: https://auth.getquestify.com/realms/questify
            - name: FERRISKEY_ADMIN_TOKEN_URI
              value: https://auth.getquestify.com/realms/questify/protocol/openid-connect/token
            - name: FERRISKEY_ADMIN_CLIENT_ID
              value: questify-service-account
            - name: FERRISKEY_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: keycloak-service-account-secret
            - name: OIDC_ROLE_CLAIM
              value: roles
            - name: MANAGEMENT_HEALTH_MAIL_ENABLED
              value: "false"
            - name: APP_PUBLIC_URL
              value: https://app.getquestify.com
            - name: PASSWORD_RESET_RATE_LIMIT_IP
              value: "20"
            - name: PASSWORD_RESET_RATE_LIMIT_EMAIL
              value: "10"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 20
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 384Mi
            limits:
              memory: 768Mi
---
