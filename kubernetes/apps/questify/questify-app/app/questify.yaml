apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done; until nc -z rabbitmq 5672; do sleep 2; done; until nc -z garage 3900; do sleep 2; done
      containers:
        - name: auth-service
          image: ghcr.io/axelfrache/questify-auth-service:latest@sha256:1eaf053afc945bfb1b5b9f52f53427db118ee1540a9575dca667b1e69cfff5d5 # {"$imagepolicy": "flux-system:questify-auth-service"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/questify?currentSchema=auth
            - name: SPRING_DATASOURCE_USERNAME
              value: questify
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: postgres-password
            - name: SPRING_DATASOURCE_DRIVER
              value: org.postgresql.Driver
            - name: SPRING_JPA_DDL_AUTO
              value: update
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USERNAME
              value: questify
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: rabbitmq-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: jwt-secret
            - name: S3_ENDPOINT
              value: http://garage:3900
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-access-key-id
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-secret-access-key
            - name: S3_BUCKET
              value: questify-profiles
            - name: S3_REGION
              value: garage
            - name: S3_PUBLIC_URL
              value: https://app.getquestify.com/storage
            - name: CORS_ALLOWED_ORIGINS
              value: https://app.getquestify.com
            - name: COOKIE_SECURE
              value: "true"
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-bootstrap-password
            - name: FERRISKEY_ISSUER_URI
              value: https://auth.getquestify.com/api/realms/questify
            - name: FERRISKEY_PASSWORD_RESET_URI
              value: https://auth.getquestify.com/api/realms/questify/login-actions/forgot-password
            - name: OIDC_ROLE_CLAIM
              value: roles
            - name: MANAGEMENT_HEALTH_MAIL_ENABLED
              value: "false"
            - name: APP_PUBLIC_URL
              value: https://app.getquestify.com
            - name: PASSWORD_RESET_RATE_LIMIT_IP
              value: "20"
            - name: PASSWORD_RESET_RATE_LIMIT_EMAIL
              value: "10"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              memory: 512Mi
---
