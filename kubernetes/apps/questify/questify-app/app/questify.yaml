apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garage-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: questify
            - name: POSTGRES_USER
              value: questify
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: postgres-password
            - name: QUEST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: quest-db-password
            - name: PROJECT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: project-db-password
            - name: PROGRESSION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: progression-db-password
            - name: STATS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: stats-db-password
            - name: ADMIN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init.sh
              subPath: init.sh
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-script
          configMap:
            name: questify-postgres-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      enableServiceLinks: false
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: questify
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: rabbitmq-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: memory.conf
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
        - name: config
          configMap:
            name: rabbitmq-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
data:
  memory.conf: |
    vm_memory_high_watermark.absolute = 192MB
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      enableServiceLinks: false
      containers:
        - name: garage
          image: docker.io/axelfrache/questify-garage:latest@sha256:7ae069ef993535178067df9bb6e10d09fbea01e4000373c9679eb32482d56519 # {"$imagepolicy": "flux-system:questify-garage"}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - /entrypoint.sh
          ports:
            - containerPort: 3900
              name: http
            - containerPort: 3901
              name: rpc
            - containerPort: 3902
              name: web
            - containerPort: 3903
              name: admin
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-rpc-secret
            - name: GARAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-access-key-id
            - name: GARAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-secret-access-key
          volumeMounts:
            - name: data
              mountPath: /var/lib/garage
            - name: garage-config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: garage-config
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
              readOnly: true
          readinessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/garage-ready
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/garage-ready
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: garage-data
        - name: garage-config
          configMap:
            name: questify-garage-config
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: garage
spec:
  selector:
    app: garage
  ports:
    - name: http
      port: 3900
      targetPort: http
    - name: web
      port: 3902
      targetPort: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done; until nc -z rabbitmq 5672; do sleep 2; done; until nc -z garage 3900; do sleep 2; done
      containers:
        - name: auth-service
          image: docker.io/axelfrache/questify-auth-service:latest@sha256:338a882a4558c52ef9134cba4efedd2796dced616ae068c7d6af904bccee9ea2 # {"$imagepolicy": "flux-system:questify-auth-service"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/questify?currentSchema=auth
            - name: SPRING_DATASOURCE_USERNAME
              value: questify
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: postgres-password
            - name: SPRING_DATASOURCE_DRIVER
              value: org.postgresql.Driver
            - name: SPRING_JPA_DDL_AUTO
              value: update
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USERNAME
              value: questify
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: rabbitmq-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: jwt-secret
            - name: S3_ENDPOINT
              value: http://garage:3900
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-access-key-id
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: garage-secret-access-key
            - name: S3_BUCKET
              value: questify-profiles
            - name: S3_REGION
              value: garage
            - name: S3_PUBLIC_URL
              value: https://app.getquestify.com/storage
            - name: CORS_ALLOWED_ORIGINS
              value: https://app.getquestify.com
            - name: COOKIE_SECURE
              value: "true"
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questify-secret
                  key: admin-bootstrap-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 512Mi
---
