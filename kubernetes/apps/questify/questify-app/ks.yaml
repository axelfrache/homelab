---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: questify-app
spec:
  dependsOn:
    - name: opentelemetry-operator
      namespace: monitoring
    - name: opentelemetry-collector
      namespace: monitoring
  interval: 1h
  path: ./kubernetes/apps/questify/questify-app/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: questify
  wait: true
