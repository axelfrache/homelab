---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: questify-postgres
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  postgresql:
    parameters:
      max_connections: "200"

  bootstrap:
    initdb:
      database: questify
      owner: questify
      postInitApplicationSQL:
        # Create service users (no password — managed.roles sets them after bootstrap)
        - "CREATE ROLE quest_svc WITH LOGIN"
        - "CREATE ROLE project_svc WITH LOGIN"
        - "CREATE ROLE progression_svc WITH LOGIN"
        - "CREATE ROLE stats_svc WITH LOGIN"
        - "CREATE ROLE admin_svc WITH LOGIN"
        - "CREATE ROLE notification_svc WITH LOGIN"
        # Grant database access
        - "GRANT CONNECT, CREATE ON DATABASE questify TO quest_svc"
        - "GRANT CONNECT, CREATE ON DATABASE questify TO project_svc"
        - "GRANT CONNECT, CREATE ON DATABASE questify TO progression_svc"
        - "GRANT CONNECT, CREATE ON DATABASE questify TO stats_svc"
        - "GRANT CONNECT, CREATE ON DATABASE questify TO admin_svc"
        - "GRANT CONNECT, CREATE ON DATABASE questify TO notification_svc"
        # Create schemas with proper ownership
        - "CREATE SCHEMA IF NOT EXISTS auth"
        - "CREATE SCHEMA IF NOT EXISTS quests AUTHORIZATION quest_svc"
        - "CREATE SCHEMA IF NOT EXISTS projects AUTHORIZATION project_svc"
        - "CREATE SCHEMA IF NOT EXISTS progression AUTHORIZATION progression_svc"
        - "CREATE SCHEMA IF NOT EXISTS stats AUTHORIZATION stats_svc"
        - "CREATE SCHEMA IF NOT EXISTS admin AUTHORIZATION admin_svc"
        - "CREATE SCHEMA IF NOT EXISTS notifications AUTHORIZATION notification_svc"
        # Allow the CNPG application owner to run full logical backups.
        - "GRANT USAGE ON SCHEMA auth, quests, projects, progression, stats, admin, notifications TO questify"
        - "GRANT SELECT ON ALL TABLES IN SCHEMA auth, quests, projects, progression, stats, admin, notifications TO questify"
        - "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA auth, quests, projects, progression, stats, admin, notifications TO questify"

  storage:
    size: 10Gi
    storageClass: longhorn

  affinity:
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  monitoring:
    enablePodMonitor: true

  managed:
    roles:
      - name: quest_svc
        ensure: present
        login: true
        passwordSecret:
          name: questify-quest-svc-db-secret
      - name: project_svc
        ensure: present
        login: true
        passwordSecret:
          name: questify-project-svc-db-secret
      - name: progression_svc
        ensure: present
        login: true
        passwordSecret:
          name: questify-progression-svc-db-secret
      - name: stats_svc
        ensure: present
        login: true
        passwordSecret:
          name: questify-stats-svc-db-secret
      - name: admin_svc
        ensure: present
        login: true
        passwordSecret:
          name: questify-admin-svc-db-secret
      - name: notification_svc
        ensure: present
        login: true
        passwordSecret:
          name: questify-notification-svc-db-secret
