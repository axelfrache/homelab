---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-operator
      version: ">=0.80.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
  values:
    manager:
      collectorImage:
        repository: otel/opentelemetry-collector-contrib
    admissionWebhooks:
      certManager:
        enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 256Mi
