---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-questify-red
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  questify-red.json: |
    {
      "id": null,
      "uid": "questify_red",
      "title": "Questify / RED Metrics",
      "description": "Throughput, Error rate and Latency per service/endpoint from OTel Java agent metrics",
      "tags": ["questify", "red", "otel"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": {
              "query": "label_values(http_server_duration_milliseconds_count{job=~\"questify/.*\"}, job)",
              "refId": "StandardVariableQuery"
            },
            "regex": "questify/(.*)",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "refresh": 2,
            "sort": 1,
            "hide": 0
          },
          {
            "name": "route",
            "label": "Route",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": {
              "query": "label_values(http_server_duration_milliseconds_count{job=~\"questify/$service\"}, http_route)",
              "refId": "StandardVariableQuery"
            },
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "refresh": 2,
            "sort": 1,
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Throughput",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Requests/s per service",
          "gridPos": { "x": 0, "y": 1, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[$__rate_interval])\n)",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Requests/s per endpoint",
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job, http_method, http_route) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_route=~\"$route\"\n  }[$__rate_interval])\n)",
              "legendFormat": "{{job}} {{http_method}} {{http_route}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Total RPS (all services)",
          "gridPos": { "x": 0, "y": 9, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[$__rate_interval])\n)",
              "legendFormat": "RPS",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "row",
          "title": "Error Rate",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "5xx Error rate per service",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_status_code=~\"5..\"\n  }[$__rate_interval])\n)\n/\nsum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[$__rate_interval])\n)",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "4xx Error rate per service",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "orange", "value": 0.1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_status_code=~\"4..\"\n  }[$__rate_interval])\n)\n/\nsum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[$__rate_interval])\n)",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "5xx Error rate per endpoint",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job, http_method, http_route) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_route=~\"$route\",\n    http_status_code=~\"5..\"\n  }[$__rate_interval])\n)\n/\nsum by (job, http_method, http_route) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_route=~\"$route\"\n  }[$__rate_interval])\n)",
              "legendFormat": "{{job}} {{http_method}} {{http_route}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Global 5xx error rate",
          "gridPos": { "x": 4, "y": 9, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_status_code=~\"5..\"\n  }[$__rate_interval])\n)\n/\nsum(\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[$__rate_interval])\n)",
              "legendFormat": "5xx rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Latency",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 1 }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Latency p50 / p95 / p99 per service",
          "gridPos": { "x": 0, "y": 31, "w": 24, "h": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50,\n  sum by (job, le) (\n    rate(http_server_duration_milliseconds_bucket{\n      job=~\"questify/.*\",\n      job=~\"questify/$service\"\n    }[$__rate_interval])\n  )\n)",
              "legendFormat": "p50 — {{job}}",
              "exemplar": true,
              "refId": "P50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95,\n  sum by (job, le) (\n    rate(http_server_duration_milliseconds_bucket{\n      job=~\"questify/.*\",\n      job=~\"questify/$service\"\n    }[$__rate_interval])\n  )\n)",
              "legendFormat": "p95 — {{job}}",
              "exemplar": true,
              "refId": "P95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99,\n  sum by (job, le) (\n    rate(http_server_duration_milliseconds_bucket{\n      job=~\"questify/.*\",\n      job=~\"questify/$service\"\n    }[$__rate_interval])\n  )\n)",
              "legendFormat": "p99 — {{job}}",
              "exemplar": true,
              "refId": "P99"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Latency p99 per endpoint",
          "gridPos": { "x": 0, "y": 40, "w": 24, "h": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max", "lastNotNull"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99,\n  sum by (job, http_method, http_route, le) (\n    rate(http_server_duration_milliseconds_bucket{\n      job=~\"questify/.*\",\n      job=~\"questify/$service\",\n      http_route=~\"$route\"\n    }[$__rate_interval])\n  )\n)",
              "legendFormat": "p99 — {{job}} {{http_method}} {{http_route}}",
              "exemplar": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Global p99 latency",
          "gridPos": { "x": 8, "y": 9, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 1000 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99,\n  sum by (le) (\n    rate(http_server_duration_milliseconds_bucket{\n      job=~\"questify/.*\",\n      job=~\"questify/$service\"\n    }[$__rate_interval])\n  )\n)",
              "legendFormat": "p99",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "type": "table",
          "title": "Service SLO snapshot (last 5m)",
          "description": "RPS, error rate and p99 latency per service over the last 5 minutes",
          "gridPos": { "x": 12, "y": 9, "w": 12, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "RPS" },
                "properties": [{ "id": "unit", "value": "reqps" }, { "id": "decimals", "value": 2 }]
              },
              {
                "matcher": { "id": "byName", "options": "Error rate 5xx" },
                "properties": [
                  { "id": "unit", "value": "percentunit" },
                  { "id": "decimals", "value": 3 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.05 }]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "p99 latency" },
                "properties": [
                  { "id": "unit", "value": "s" },
                  { "id": "decimals", "value": 3 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 1 }]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "options": { "sortBy": [{ "displayName": "RPS", "desc": true }] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[5m])\n)",
              "legendFormat": "{{job}}",
              "refId": "RPS",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\",\n    http_status_code=~\"5..\"\n  }[5m])\n)\n/\nsum by (job) (\n  rate(http_server_duration_milliseconds_count{\n    job=~\"questify/$service\"\n  }[5m])\n)",
              "legendFormat": "{{job}}",
              "refId": "ERR",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99,\n  sum by (job, le) (\n    rate(http_server_duration_milliseconds_bucket{\n      job=~\"questify/.*\",\n      job=~\"questify/$service\"\n    }[5m])\n  )\n)",
              "legendFormat": "{{job}}",
              "refId": "P99",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Value #RPS": "RPS",
                  "Value #ERR": "Error rate 5xx",
                  "Value #P99": "p99 latency",
                  "job": "Service"
                },
                "excludeByName": { "Time": true }
              }
            }
          ]
        }
      ]
    }
