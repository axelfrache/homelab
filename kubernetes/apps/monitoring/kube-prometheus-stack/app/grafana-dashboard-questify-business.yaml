---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-questify-business
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  questify-business.json: |
    {
      "id": null,
      "uid": "questify_business",
      "title": "Questify — Business Metrics",
      "description": "Quest activity and distributions from Tempo span_metrics (Prometheus). Requires span_metrics processor with questify.* dimensions.",
      "tags": ["questify", "business", "otel", "prometheus"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "1m",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Quest Activity",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Quest completions / s",
          "gridPos": {"x": 0, "y": 1, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.complete\", status_code!=\"STATUS_CODE_ERROR\"}[$__rate_interval])",
              "legendFormat": "completed",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Quest creations / s",
          "gridPos": {"x": 12, "y": 1, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.create\", status_code!=\"STATUS_CODE_ERROR\"}[$__rate_interval])",
              "legendFormat": "created",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Completions (period)",
          "gridPos": {"x": 0, "y": 9, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["sum"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.complete\", status_code!=\"STATUS_CODE_ERROR\"}[$__range])",
              "legendFormat": "completions",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Creations (period)",
          "gridPos": {"x": 4, "y": 9, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["sum"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.create\", status_code!=\"STATUS_CODE_ERROR\"}[$__range])",
              "legendFormat": "creations",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Quest errors (period)",
          "gridPos": {"x": 8, "y": 9, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 10}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["sum"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=~\"quest[.].*\", status_code=\"STATUS_CODE_ERROR\"}[$__range])",
              "legendFormat": "errors",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "text",
          "title": "XP total — note",
          "gridPos": {"x": 12, "y": 9, "w": 12, "h": 4},
          "options": {
            "mode": "markdown",
            "content": "**XP total distribué** n'est pas directement sommable via span_metrics (les valeurs d'attributs numériques deviennent des labels, pas des valeurs).\n\nPour l'obtenir, ajouter un counter Micrometer dans `QuestService.completeQuest` :\n```java\ncounter(\"questify.xp.distributed\",\n  \"service\", serviceName)\n  .increment(xpAwarded);\n```\nCela exposera `questify_xp_distributed_total` dans Prometheus."
          }
        },
        {
          "id": 8,
          "type": "row",
          "title": "Distributions",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 13, "w": 24, "h": 1}
        },
        {
          "id": 9,
          "type": "piechart",
          "title": "Quests created — by difficulty",
          "description": "Requires questify.quest.difficulty span attribute and span_metrics custom dimensions",
          "gridPos": {"x": 0, "y": 14, "w": 8, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["sum"]},
            "pieType": "pie",
            "legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.create\", status_code!=\"STATUS_CODE_ERROR\"}[$__range]) > 0",
              "legendFormat": "{{questify_quest_difficulty}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "piechart",
          "title": "Quests created — by frequency",
          "description": "Requires questify.quest.frequency span attribute and span_metrics custom dimensions",
          "gridPos": {"x": 8, "y": 14, "w": 8, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["sum"]},
            "pieType": "donut",
            "legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.create\", status_code!=\"STATUS_CODE_ERROR\"}[$__range]) > 0",
              "legendFormat": "{{questify_quest_frequency}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "type": "barchart",
          "title": "XP awarded — distribution by tier",
          "description": "Requires questify.xp.awarded span attribute and span_metrics custom dimensions",
          "gridPos": {"x": 16, "y": 14, "w": 8, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["sum"]},
            "orientation": "auto",
            "xTickLabelRotation": 0,
            "groupWidth": 0.7,
            "barWidth": 0.97,
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "single"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(traces_spanmetrics_calls_total{service=\"questify-quest-service\", span_name=\"quest.complete\", status_code!=\"STATUS_CODE_ERROR\"}[$__range]) > 0",
              "legendFormat": "{{questify_xp_awarded}} XP",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "type": "row",
          "title": "Operation Health",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 23, "w": 24, "h": 1}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Error rate per operation (all services)",
          "description": "Rate of spans with status=error grouped by span name.",
          "gridPos": {"x": 0, "y": 24, "w": 24, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 8}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(traces_spanmetrics_calls_total{service=~\"questify-.*\", status_code=\"STATUS_CODE_ERROR\"}[$__rate_interval])",
              "legendFormat": "{{service_name}} / {{span_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Throughput per operation (quest-service)",
          "gridPos": {"x": 0, "y": 33, "w": 24, "h": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 8}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(traces_spanmetrics_calls_total{service=\"questify-quest-service\", status_code!=\"STATUS_CODE_ERROR\"}[$__rate_interval])",
              "legendFormat": "{{span_name}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
