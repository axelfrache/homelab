---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  values:
    crds:
      enabled: true
    defaultRules:
      rules:
        kubeApiserverBurnrate: false
        kubeApiserverAvailability: false
    alertmanager:
      enabled: true
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: telegram
          routes:
            - matchers:
                - alertname = "Watchdog"
              receiver: "null"
            - matchers:
                - alertname = "InfoInhibitor"
              receiver: "null"
            - matchers:
                - alertname = "KubeProxyDown"
              receiver: "null"
            - matchers:
                - alertname =~ "KubeNodeNotReady|KubeNodeUnreachable|KubeNodeReadinessFlapping"
              receiver: telegram
              repeat_interval: 30m
            - matchers:
                - severity = "critical"
              receiver: telegram
              repeat_interval: 1h
        receivers:
          - name: "null"
          - name: telegram
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram-secret/telegram-bot-token
                chat_id: 8790936034
                parse_mode: HTML
                message: |-
                  {{ range .Alerts -}}
                  {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} <b>{{ .Labels.alertname }}</b>
                  {{ if eq .Labels.severity "critical" }}🔴 critical{{ else if eq .Labels.severity "warning" }}🟡 warning{{ else }}⚪ {{ .Labels.severity }}{{ end }} | {{ .Status | toUpper }}
                  {{ if .Labels.namespace }}📦 <i>{{ .Labels.namespace }}</i>{{ end }}{{ if .Labels.node }} 🖥️ <i>{{ .Labels.node }}</i>{{ end }}

                  {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ end }}
                  {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
                  {{ if .Annotations.runbook_url }}📖 <a href="{{ .Annotations.runbook_url }}">Runbook</a>{{ end }}
                  {{ end -}}
        inhibit_rules:
          - source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
            equal: ["alertname", "namespace"]
      alertmanagerSpec:
        secrets:
          - alertmanager-telegram-secret
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 1Gi
    prometheus:
      prometheusSpec:
        retention: 3d
        tsdb:
          outOfOrderTimeWindow: 10m
        resources:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            memory: 1Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 20Gi
    grafana:
      enabled: true
      defaultDashboardsTimezone: Europe/Paris
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 5Gi
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      grafana.ini:
        auth.anonymous:
          enabled: false
    kubeProxy:
      enabled: false
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
