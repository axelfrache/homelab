---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 48h

    metrics_generator:
      traces_storage:
        path: /var/tempo/generator/traces
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
      processor:
        local_blocks:
          filter_server_spans: false
          flush_to_storage: true
        span_metrics:
          dimensions:
            - questify.quest.difficulty
            - questify.quest.frequency
            - questify.xp.awarded

    query_frontend:
      search:
        max_duration: 48h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    overrides:
      defaults:
        metrics_generator:
          processors: [span-metrics, local-blocks]
          generate_native_histograms: both
