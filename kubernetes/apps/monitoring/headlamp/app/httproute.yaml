---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: monitoring
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - headlamp.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: headlamp
          port: 4466
