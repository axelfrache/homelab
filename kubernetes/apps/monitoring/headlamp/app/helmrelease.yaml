---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
  values:
    replicaCount: 1
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    clusterRoleBinding:
      create: true
