---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: trivy-operator
      version: "0.30.1"
      sourceRef:
        kind: HelmRepository
        name: aquasecurity
  values:
    trivy:
      mode: Standalone
      ignoreUnfixed: true

    operator:
      scannerReportTTL: 24h
      vulnerabilityScannerEnabled: true
      configAuditScannerEnabled: true
      rbacAssessmentScannerEnabled: true
      infraAssessmentScannerEnabled: true
      builtInTrivyServer: false
      metricsVulnIdEnabled: true

    serviceMonitor:
      enabled: true
      interval: 60s

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
