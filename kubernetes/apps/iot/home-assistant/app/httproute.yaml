---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant
  namespace: iot
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - assistant.${SECRET_LOCAL_DOMAIN}
  rules:
    - backendRefs:
        - name: home-assistant
          port: 80
