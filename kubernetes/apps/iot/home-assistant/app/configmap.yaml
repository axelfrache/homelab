---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config
data:
  configuration.yaml: |
    default_config:

    homeassistant:
      name: firelink
      country: FR
      time_zone: Europe/Paris
      unit_system: metric

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.42.0.0/16
        - 192.168.1.0/24

    prometheus:
      namespace: hass
      requires_auth: false
      component_config:
        sensor.homelab_consommation_actuelle:
          override_metric: homelab_power_w
        sensor.homelab_consommation_d_aujourd_hui:
          override_metric: homelab_energy_kwh
        sensor.homelab_la_consommation_de_ce_mois_ci:
          override_metric: homelab_energy_kwh
        sensor.homelab_courant:
          override_metric: homelab_current_a
        sensor.homelab_tension:
          override_metric: homelab_voltage_v
      component_config_glob:
        sensor.*power*:
          override_metric: homelab_power_w
        sensor.*puissance*:
          override_metric: homelab_power_w
        sensor.*energy*:
          override_metric: homelab_energy_kwh
        sensor.*energie*:
          override_metric: homelab_energy_kwh
        sensor.*consumption*:
          override_metric: homelab_energy_kwh
        sensor.*current*:
          override_metric: homelab_current_a
        sensor.*voltage*:
          override_metric: homelab_voltage_v
      filter:
        include_entities:
          - sensor.homelab_consommation_actuelle
          - sensor.homelab_consommation_d_aujourd_hui
          - sensor.homelab_la_consommation_de_ce_mois_ci
          - sensor.homelab_courant
          - sensor.homelab_tension
          - switch.homelab
