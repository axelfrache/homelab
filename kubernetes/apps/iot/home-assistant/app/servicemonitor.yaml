---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: home-assistant
spec:
  namespaceSelector:
    matchNames:
      - iot
  selector:
    matchLabels:
      app: home-assistant
  endpoints:
    - port: http
      path: /api/prometheus
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
