apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -ec
            - until nc -w 5 -z listle-postgres-rw 5432; do sleep 2; done
      containers:
        - name: backend
          image: ghcr.io/axelfrache/daydash-backend:latest@sha256:197578ab53b1b8e48cbb7c72388fb98fe387ef43aa3ce8c2cdf1352b17043f5d # {"$imagepolicy": "flux-system:daydash-backend"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DATABASE_URL
              value: jdbc:postgresql://listle-postgres-rw:5432/daydash
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: listle-postgres-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: listle-postgres-app
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: listle-secret
                  key: jwt-secret
            - name: JWT_EXPIRATION_MS
              value: "86400000"
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/axelfrache/daydash-frontend:latest@sha256:c6b89402b9181604f312f65cc69887c106d2e8ef77b97dfee6483bc05a5206ec # {"$imagepolicy": "flux-system:daydash-frontend"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: listle
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - daydash.${SECRET_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 8080
    - backendRefs:
        - name: frontend
          port: 80
