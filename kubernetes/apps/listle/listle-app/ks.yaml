---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: listle-app
spec:
  dependsOn:
    - name: listle-db
  interval: 1h
  path: ./kubernetes/apps/listle/listle-app/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: listle
  wait: true
