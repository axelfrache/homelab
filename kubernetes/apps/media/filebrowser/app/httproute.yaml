---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser
  namespace: media
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - files.${SECRET_LOCAL_DOMAIN}
  rules:
    - backendRefs:
        - name: filebrowser
          port: 80
