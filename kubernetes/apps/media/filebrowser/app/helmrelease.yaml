---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
spec:
  chartRef:
    kind: OCIRepository
    name: filebrowser
  interval: 1h
  values:
    controllers:
      filebrowser:
        containers:
          app:
            image:
              repository: filebrowser/filebrowser
              tag: latest
            args:
              - --root=/srv
              - --database=/database/filebrowser.db
              - --port=80
              - --address=0.0.0.0
            env:
              TZ: Europe/Paris
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false

    service:
      app:
        ports:
          http:
            port: &port 80

    ingress:
      app:
        enabled: false

    persistence:
      database:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /database

      media:
        type: nfs
        server: 192.168.1.20
        path: /mnt/tank
        globalMounts:
          - path: /srv
