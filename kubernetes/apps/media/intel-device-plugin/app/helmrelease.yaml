---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugin-gpu
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.35.0
      sourceRef:
        kind: HelmRepository
        name: intel-device-plugins
        namespace: kube-system
  values:
    nodeFeatureRule: true
    tolerations:
      - key: gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
