---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: anchor
  template:
    metadata:
      labels:
        app: anchor
    spec:
      containers:
        - name: anchor
          image: ghcr.io/zhfahim/anchor:0.11.0
          env:
            - name: APP_URL
              value: https://anchor.${SECRET_LOCAL_DOMAIN}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: anchor-data
