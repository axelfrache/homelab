---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:latest
          env:
            - name: SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: homarr-secret
                  key: SECRET_ENCRYPTION_KEY
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/custom-ca/ca.crt
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          ports:
            - name: http
              containerPort: 7575
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /appdata
            - name: proxmox-ca
              mountPath: /etc/ssl/custom-ca
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      hostAliases:
        - ip: "192.168.1.20"
          hostnames:
            - "pve.local"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homarr-data
        - name: proxmox-ca
          configMap:
            name: proxmox-ca
