---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: ">=0.32.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: descheduler
  values:
    kind: CronJob
    schedule: "*/15 * * * *"

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 1
      maxNoOfPodsToEvictTotal: 3
      profiles:
        - name: default
          pluginConfig:
            - name: LowNodeUtilization
              args:
                thresholds:
                  cpu: 40
                  memory: 40
                targetThresholds:
                  cpu: 60
                  memory: 50
            - name: DefaultEvictor
              args:
                ignorePvcPods: false
                evictLocalStoragePods: false
                nodeFit: true
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
