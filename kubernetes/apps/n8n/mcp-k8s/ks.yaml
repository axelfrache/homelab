---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-k8s
  namespace: flux-system
spec:
  targetNamespace: n8n
  commonMetadata:
    labels:
      app.kubernetes.io/name: mcp-k8s
  path: ./kubernetes/apps/n8n/mcp-k8s/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
