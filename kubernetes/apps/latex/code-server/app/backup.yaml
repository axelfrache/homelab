---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: latex-home-backup
spec:
  schedule: "41 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: latex-code-server
                  topologyKey: kubernetes.io/hostname
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - sh
                - -ec
                - |
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  mkdir -p /backup/latex
                  tar -C /home/coder -czf "/backup/latex/latex-home-$ts.tar.gz" .
                  find /backup/latex -type f -name 'latex-home-*.tar.gz' -mtime +30 -delete
              volumeMounts:
                - name: home
                  mountPath: /home/coder
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: home
              persistentVolumeClaim:
                claimName: latex-home
            - name: backup
              nfs:
                server: 192.168.1.20
                path: /mnt/tank/backups
