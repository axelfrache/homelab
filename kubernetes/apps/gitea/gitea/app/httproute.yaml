---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea
  namespace: gitea
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - gitea.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: gitea-http
          port: 3000
