---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chartRef:
    kind: OCIRepository
    name: longhorn
  interval: 1h
  values:
    defaultSettings:
      defaultReplicaCount: 2
      storageMinimalAvailablePercentage: 10
      storageReservedPercentageForDefaultDisk: 10
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
    longhornUI:
      replicas: 1
