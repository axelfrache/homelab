---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.7.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              OLLAMA_PID=$!
              echo "Waiting for ollama to be ready..."
              until ollama list > /dev/null 2>&1; do sleep 2; done
              echo "Pulling llama3.2:3b..."
              ollama pull llama3.2:3b
              kill $OLLAMA_PID
              wait $OLLAMA_PID 2>/dev/null || true
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 4Gi
      containers:
        - name: ollama
          image: ollama/ollama:0.7.1
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: ollama-secret
                  key: OLLAMA_API_KEY
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
