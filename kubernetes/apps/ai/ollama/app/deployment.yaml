---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
      annotations:
        model: llama3.2:1b
    spec:
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.7.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              OLLAMA_PID=$!
              echo "Waiting for ollama to be ready..."
              until ollama list > /dev/null 2>&1; do sleep 2; done
              echo "Pulling llama3.2:1b..."
              ollama pull llama3.2:1b
              kill $OLLAMA_PID
              wait $OLLAMA_PID 2>/dev/null || true
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_VULKAN
              value: "1"
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              gpu.intel.com/i915: 1
            limits:
              memory: 4Gi
              gpu.intel.com/i915: 1
      containers:
        - name: ollama
          image: ollama/ollama:0.7.1
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_VULKAN
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_KEEP_ALIVE
              value: "2m"
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              gpu.intel.com/i915: 1
            limits:
              memory: 3Gi
              gpu.intel.com/i915: 1
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
