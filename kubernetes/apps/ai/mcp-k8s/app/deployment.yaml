---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-k8s
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-k8s
  template:
    metadata:
      labels:
        app: mcp-k8s
    spec:
      serviceAccountName: mcp-k8s
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: mcp-k8s
          image: ghcr.io/containers/kubernetes-mcp-server:v0.0.60
          args: ["--port", "8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-k8s
  namespace: ai
spec:
  selector:
    app: mcp-k8s
  ports:
    - port: 8080
      targetPort: 8080
