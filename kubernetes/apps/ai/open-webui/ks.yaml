---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-webui
  namespace: flux-system
spec:
  dependsOn:
    - name: ollama
  targetNamespace: ai
  commonMetadata:
    labels:
      app.kubernetes.io/name: open-webui
  path: ./kubernetes/apps/ai/open-webui/app
  prune: true
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
